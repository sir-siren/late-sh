name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/mpiorowski/late-sh.git
          git fetch upstream
          git checkout main
          git merge upstream/main --ff-only --allow-unrelated-histories
          git push origin main
